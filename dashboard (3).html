<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>방패 대시보드</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:linear-gradient(160deg,#f0f4ff 0%,#faf8f5 50%,#f0fdf8 100%);min-height:100vh;}
input,textarea,button{font-family:inherit;}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:9999px;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:white;border:2.5px solid var(--tc,#6366f1);box-shadow:0 2px 6px rgba(0,0,0,0.15);cursor:pointer;}
.spin{animation:spin 1s linear infinite;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.card{background:white;border-radius:18px;box-shadow:0 2px 16px rgba(0,0,0,0.07),0 1px 4px rgba(0,0,0,0.04);padding:18px;}
.btn{border:none;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.btn:active{transform:scale(0.96);}
/* PC grid */
@media(min-width:768px){
  .main-grid{display:grid;grid-template-columns:5fr 4fr 3fr;gap:20px;}
  .mid-col{display:flex;flex-direction:column;gap:20px;}
  .right-col{display:flex;flex-direction:column;gap:20px;}
  .mood-grid{display:grid;grid-template-columns:5fr 7fr;gap:20px;}
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
  .pc-only{display:flex;}
  .mobile-only{display:none !important;}
}
/* Mobile */
@media(max-width:767px){
  .main-grid{display:flex;flex-direction:column;gap:14px;}
  .mid-col{display:flex;flex-direction:column;gap:14px;}
  .right-col{display:flex;flex-direction:column;gap:14px;}
  .mood-grid{display:flex;flex-direction:column;gap:14px;}
  .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .pc-only{display:none !important;}
  .mobile-only{display:flex;}
}
.col{display:flex;flex-direction:column;gap:14px;}
.label{font-size:12px;font-weight:600;color:#475569;margin-bottom:6px;}
.hint{font-size:11px;color:#94a3b8;margin-top:2px;margin-bottom:8px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback,useRef}=React;

const SUPABASE_URL="https://lkebexrcolnxqyjeszgs.supabase.co";
const SUPABASE_KEY="sb_publishable_raYRR0FC94KqKMz78hmmbg_1cZ4mFV8";
const API=`${SUPABASE_URL}/rest/v1`;
const AUTH=`${SUPABASE_URL}/auth/v1`;

function getToken(){return localStorage.getItem("sb_token");}
function getUser(){try{return JSON.parse(localStorage.getItem("sb_user"));}catch{return null;}}
function setToken(t){localStorage.setItem("sb_token",t);}
function setUser(u){localStorage.setItem("sb_user",JSON.stringify(u));}
function clearAuth(){localStorage.removeItem("sb_token");localStorage.removeItem("sb_user");}

async function sbFetch(url,opts={}){
  const res=await fetch(url,{...opts,headers:{"Content-Type":"application/json","apikey":SUPABASE_KEY,"Authorization":`Bearer ${getToken()||SUPABASE_KEY}`,...(opts.headers||{})}});
  const text=await res.text();const data=text?JSON.parse(text):null;
  if(!res.ok)throw new Error(data?.error_description||data?.message||data?.error||"오류가 발생했어요");
  return data;
}
async function signUp(e,p){const d=await sbFetch(`${AUTH}/signup`,{method:"POST",body:JSON.stringify({email:e,password:p})});if(d.access_token){setToken(d.access_token);setUser(d.user);}return d;}
async function signIn(e,p){const d=await sbFetch(`${AUTH}/token?grant_type=password`,{method:"POST",body:JSON.stringify({email:e,password:p})});setToken(d.access_token);setUser(d.user);return d;}
async function signOut(){try{await sbFetch(`${AUTH}/logout`,{method:"POST"});}catch{}clearAuth();}
async function loadAllEntries(email){const d=await sbFetch(`${API}/dashboard_entries?user_email=eq.${encodeURIComponent(email)}&select=entry_date,data&order=entry_date.desc`);const r={};(d||[]).forEach(row=>{r[row.entry_date]=row.data;});return r;}
async function loadEntry(email,date){const d=await sbFetch(`${API}/dashboard_entries?user_email=eq.${encodeURIComponent(email)}&entry_date=eq.${date}&select=data`);return d&&d.length>0?d[0].data:null;}
async function saveEntry(email,date,data){await sbFetch(`${API}/dashboard_entries`,{method:"POST",headers:{"Prefer":"resolution=merge-duplicates"},body:JSON.stringify({user_email:email,entry_date:date,data,updated_at:new Date().toISOString()})});}

const defaultEntry=()=>({weeklyGoal:0,proactiveScore:0,deepFocusHours:0,deepFocusMinutes:0,anxietyDefenseCount:0,routineYoga:false,routinePT:false,routinePersonal:false,physicalEnergy:50,postWorkoutRefresh:0,bodyWeight:"",poopDone:null,emotionalDrain:0,chatbotMode:null,rewardRuleMet:null,metacognitionLog:"",selfCompassionCount:0,moodLog:"",moodScore:0});
const C={study:"#6366f1",workout:"#0d9488",romance:"#f43f5e",mental:"#f59e0b",health:"#10b981"};
function formatDate(d){return d.toISOString().split("T")[0];}
function parseDate(s){const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);}
function useIsMobile(){const[m,setM]=useState(window.innerWidth<768);useEffect(()=>{const h=()=>setM(window.innerWidth<768);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);return m;}

// ── UI Atoms ───────────────────────────────────────────────
function Slider({value,onChange,color="#6366f1"}){
  return <input type="range" min={0} max={100} value={value} onChange={e=>onChange(Number(e.target.value))}
    style={{background:`linear-gradient(to right,${color} ${value}%,#e2e8f0 ${value}%)`,"--tc":color}}/>;
}
function Stars({value,onChange,color,size=22}){
  return(
    <div style={{display:"flex",gap:"6px"}}>
      {[1,2,3,4,5].map(s=>(
        <button key={s} className="btn" onClick={()=>onChange(s===value?0:s)} style={{background:"none",padding:"2px"}}>
          <svg width={size} height={size} viewBox="0 0 24 24" fill={s<=value?color:"none"} stroke={s<=value?color:"#cbd5e1"} strokeWidth="1.5">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
        </button>
      ))}
    </div>
  );
}
function Counter({value,onChange,color,large=false}){
  const sz=large?42:34;
  const s={width:`${sz}px`,height:`${sz}px`,borderRadius:"10px",border:"1.5px solid #e2e8f0",background:"#f8fafc",cursor:"pointer",fontSize:large?22:18,color:"#64748b",display:"flex",alignItems:"center",justifyContent:"center"};
  return(
    <div style={{display:"flex",alignItems:"center",gap:"14px"}}>
      <button className="btn" style={s} onClick={()=>onChange(Math.max(0,value-1))}>−</button>
      <span style={{fontSize:large?28:22,fontWeight:"900",color,minWidth:"44px",textAlign:"center"}}>{value}</span>
      <button className="btn" style={s} onClick={()=>onChange(value+1)}>+</button>
    </div>
  );
}
function Toggle({value,onChange,compact=false}){
  return(
    <div style={{display:"flex",gap:"8px"}}>
      {[{v:true,l:compact?"예":"✅ 예"},{v:false,l:compact?"아니오":"❌ 아니오"}].map(({v,l})=>(
        <button key={String(v)} className="btn" onClick={()=>onChange(v)}
          style={{flex:1,padding:compact?"6px 10px":"10px 8px",borderRadius:"10px",fontSize:compact?"12px":"13px",fontWeight:"700",
            background:value===v?(v?"#d1fae5":"#fee2e2"):"#f8fafc",
            color:value===v?(v?"#059669":"#dc2626"):"#94a3b8",
            border:`1.5px solid ${value===v?(v?"#6ee7b7":"#fca5a5"):"#e2e8f0"}`}}>
          {l}
        </button>
      ))}
    </div>
  );
}
function Checkbox({checked,onChange,label}){
  return(
    <button className="btn" onClick={()=>onChange(!checked)} style={{background:"none",border:"none",display:"flex",alignItems:"center",gap:"8px",padding:"4px 0"}}>
      <div style={{width:"20px",height:"20px",borderRadius:"6px",border:`2px solid ${checked?"#0d9488":"#cbd5e1"}`,background:checked?"#0d9488":"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
        {checked&&<span style={{color:"white",fontSize:"12px",fontWeight:"900"}}>✓</span>}
      </div>
      <span style={{fontSize:"13px",color:checked?"#1e293b":"#94a3b8",fontWeight:checked?"600":"400"}}>{label}</span>
    </button>
  );
}
function ProgressRing({value,color="#6366f1",size=120}){
  const stroke=10,r=(size-stroke)/2,circ=2*Math.PI*r,offset=circ-(value/100)*circ;
  return(
    <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#f1f5f9" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
          style={{transition:"stroke-dashoffset 0.6s ease"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <span style={{fontSize:size>100?"22px":"18px",fontWeight:"900",color:"#1e293b"}}>{value}%</span>
        <span style={{fontSize:"10px",color:"#94a3b8"}}>달성률</span>
      </div>
    </div>
  );
}
function MoodPicker({value,onChange,compact=false}){
  const moods=[{s:1,e:"😞",l:"힘듦"},{s:2,e:"😕",l:"우울"},{s:3,e:"😐",l:"보통"},{s:4,e:"🙂",l:"좋음"},{s:5,e:"😄",l:"최고"}];
  return(
    <div style={{display:"flex",gap:"8px"}}>
      {moods.map(({s,e,l})=>(
        <button key={s} className="btn" onClick={()=>onChange(s===value?0:s)}
          style={{flex:1,padding:compact?"8px 2px":"10px 4px",borderRadius:"12px",border:`1.5px solid ${value===s?"#fbbf24":"#e2e8f0"}`,
            background:value===s?"#fef3c7":"#f8fafc",transform:value===s?"scale(1.06)":"scale(1)",
            display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"}}>
          <span style={{fontSize:compact?"18px":"20px"}}>{e}</span>
          <span style={{fontSize:"10px",color:value===s?"#92400e":"#94a3b8"}}>{l}</span>
        </button>
      ))}
    </div>
  );
}
function SectionHeader({emoji,title,subtitle,color}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:"10px",paddingBottom:"12px",borderBottom:"1px solid #f1f5f9",marginBottom:"4px"}}>
      <div style={{width:"36px",height:"36px",borderRadius:"10px",background:color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px",flexShrink:0}}>{emoji}</div>
      <div>
        <div style={{fontSize:"14px",fontWeight:"800",color:"#1e293b"}}>{title}</div>
        <div style={{fontSize:"11px",color:"#94a3b8",marginTop:"1px"}}>{subtitle}</div>
      </div>
    </div>
  );
}
function MetricRow({label,value,color}){
  return(
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid #f8fafc"}}>
      <span style={{fontSize:"12px",color:"#94a3b8"}}>{label}</span>
      <span style={{fontSize:"12px",fontWeight:"700",color}}>{value}</span>
    </div>
  );
}

// ── Login ──────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const[mode,setMode]=useState("login");
  const[email,setEmail]=useState("");
  const[pw,setPw]=useState("");
  const[showPw,setShowPw]=useState(false);
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");
  const[success,setSuccess]=useState("");
  const handle=async()=>{
    setError("");setSuccess("");
    if(!email||!pw){setError("이메일과 비밀번호를 입력해주세요");return;}
    setLoading(true);
    try{
      if(mode==="signup"){await signUp(email,pw);setSuccess("가입 완료! 로그인해주세요 🎉");setMode("login");}
      else{await signIn(email,pw);onLogin();}
    }catch(e){setError(e.message);}
    finally{setLoading(false);}
  };
  const inp={width:"100%",padding:"12px 14px 12px 42px",borderRadius:"12px",border:"1.5px solid #e2e8f0",background:"#f8fafc",fontSize:"15px",color:"#374151",outline:"none"};
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
      <div style={{width:"100%",maxWidth:"380px"}}>
        <div style={{textAlign:"center",marginBottom:"32px"}}>
          <div style={{width:"64px",height:"64px",borderRadius:"20px",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",boxShadow:"0 8px 24px #6366f133",fontSize:"28px"}}>🛡️</div>
          <h1 style={{fontSize:"26px",fontWeight:"900",color:"#1e293b"}}>방패 대시보드</h1>
          <p style={{fontSize:"13px",color:"#94a3b8",marginTop:"6px"}}>시험 준비 멘탈 관리 시스템</p>
        </div>
        <div className="card" style={{padding:"24px"}}>
          <div style={{display:"flex",background:"#f1f5f9",borderRadius:"12px",padding:"4px",marginBottom:"20px"}}>
            {["login","signup"].map(m=>(
              <button key={m} className="btn" onClick={()=>{setMode(m);setError("");setSuccess("");}}
                style={{flex:1,padding:"8px",borderRadius:"10px",fontSize:"13px",fontWeight:"700",border:"none",
                  background:mode===m?"white":"transparent",color:mode===m?"#6366f1":"#94a3b8",
                  boxShadow:mode===m?"0 1px 4px rgba(0,0,0,0.1)":"none"}}>
                {m==="login"?"로그인":"회원가입"}
              </button>
            ))}
          </div>
          <div className="col" style={{gap:"12px"}}>
            <div style={{position:"relative"}}>
              <span style={{position:"absolute",left:"14px",top:"50%",transform:"translateY(-50%)",fontSize:"16px"}}>✉️</span>
              <input type="email" placeholder="이메일" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handle()} style={inp}/>
            </div>
            <div style={{position:"relative"}}>
              <span style={{position:"absolute",left:"14px",top:"50%",transform:"translateY(-50%)",fontSize:"16px"}}>🔒</span>
              <input type={showPw?"text":"password"} placeholder="비밀번호 (6자 이상)" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handle()} style={{...inp,paddingRight:"44px"}}/>
              <button className="btn" onClick={()=>setShowPw(!showPw)} style={{position:"absolute",right:"14px",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",fontSize:"18px"}}>{showPw?"🙈":"👁️"}</button>
            </div>
          </div>
          {error&&<div style={{marginTop:"12px",padding:"10px 14px",borderRadius:"10px",background:"#fff1f2",color:"#e11d48",fontSize:"13px"}}>{error}</div>}
          {success&&<div style={{marginTop:"12px",padding:"10px 14px",borderRadius:"10px",background:"#f0fdf4",color:"#15803d",fontSize:"13px"}}>{success}</div>}
          <button className="btn" onClick={handle} disabled={loading}
            style={{marginTop:"16px",width:"100%",padding:"14px",borderRadius:"14px",border:"none",
              background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"white",fontWeight:"800",fontSize:"15px",
              boxShadow:"0 4px 16px #6366f133",opacity:loading?0.7:1,
              display:"flex",alignItems:"center",justifyContent:"center",gap:"8px"}}>
            {loading&&<div className="spin" style={{width:"16px",height:"16px",border:"2px solid rgba(255,255,255,0.3)",borderTopColor:"white",borderRadius:"50%"}}/>}
            {mode==="login"?"로그인하기":"회원가입하기"}
          </button>
        </div>
        <p style={{textAlign:"center",fontSize:"12px",color:"#94a3b8",marginTop:"16px"}}>데이터는 Supabase 클라우드에 안전하게 저장돼요 ☁️</p>
      </div>
    </div>
  );
}

// ── History Modal ──────────────────────────────────────────
function HistoryModal({allData,onClose,isMobile}){
  const dates=Object.keys(allData).sort().reverse();
  const sc=v=>v>=70?"#10b981":v>=45?"#f59e0b":"#f43f5e";
  const score=e=>{const s=(e.weeklyGoal*0.35)+(e.proactiveScore*7)+Math.min(e.deepFocusHours*5,18);const w=(e.physicalEnergy*0.18)+(e.postWorkoutRefresh*5);const r=Math.max(0,18-e.emotionalDrain*0.18);return Math.round(Math.min(100,(s+w+r)/1.35));};
  const me=["","😞","😕","😐","🙂","😄"];
  const modalStyle=isMobile
    ?{position:"fixed",inset:0,zIndex:50,display:"flex",alignItems:"flex-end",justifyContent:"center",background:"rgba(15,23,42,0.5)",backdropFilter:"blur(4px)"}
    :{position:"fixed",inset:0,zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",padding:"24px",background:"rgba(15,23,42,0.5)",backdropFilter:"blur(4px)"};
  const boxStyle=isMobile
    ?{width:"100%",borderRadius:"20px 20px 0 0",overflow:"hidden",background:"white",boxShadow:"0 -8px 40px rgba(0,0,0,0.15)",maxHeight:"80vh",display:"flex",flexDirection:"column"}
    ?{width:"100%",maxWidth:"640px",borderRadius:"20px",overflow:"hidden",background:"white",boxShadow:"0 24px 64px rgba(0,0,0,0.18)",maxHeight:"80vh",display:"flex",flexDirection:"column"}:{}
    :{width:"100%",maxWidth:"640px",borderRadius:"20px",overflow:"hidden",background:"white",boxShadow:"0 24px 64px rgba(0,0,0,0.18)",maxHeight:"80vh",display:"flex",flexDirection:"column"};
  return(
    <div style={modalStyle}>
      <div style={boxStyle}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px",borderBottom:"1px solid #f1f5f9"}}>
          <span style={{fontSize:"15px",fontWeight:"800",color:"#374151"}}>📋 기록 히스토리</span>
          <button className="btn" onClick={onClose} style={{background:"#f1f5f9",border:"none",borderRadius:"8px",padding:"6px 12px",fontSize:"13px",color:"#64748b",fontWeight:"600"}}>닫기</button>
        </div>
        {dates.length===0
          ?<div style={{padding:"48px",textAlign:"center",color:"#94a3b8",fontSize:"14px"}}>아직 저장된 기록이 없어요 🌱</div>
          :<div style={{overflowY:"auto",flex:1}}>
            {dates.map(d=>{const e=allData[d],s=score(e);return(
              <div key={d} style={{padding:"12px 20px",borderBottom:"1px solid #f8fafc",display:"flex",alignItems:"center",gap:"12px"}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:"11px",color:"#94a3b8",fontFamily:"monospace",marginBottom:"5px"}}>{d} {me[e.moodScore||0]}</div>
                  <div style={{display:"flex",gap:"10px",flexWrap:"wrap"}}>
                    {[["목표",`${e.weeklyGoal}%`,"#374151"],["에너지",`${e.physicalEnergy}%`,"#374151"],["감소",`${e.emotionalDrain}%`,e.emotionalDrain>50?"#f43f5e":"#10b981"],e.bodyWeight&&["체중",`${e.bodyWeight}kg`,"#374151"]].filter(Boolean).map(([l,v,c])=>(
                      <span key={l} style={{fontSize:"12px"}}><span style={{color:"#94a3b8"}}>{l} </span><span style={{fontWeight:"700",color:c}}>{v}</span></span>
                    ))}
                  </div>
                </div>
                <div style={{textAlign:"center",minWidth:"40px"}}>
                  <div style={{fontSize:"18px",fontWeight:"900",color:sc(s)}}>{s}</div>
                  <div style={{fontSize:"10px",color:"#94a3b8"}}>점</div>
                </div>
              </div>
            );})}
          </div>
        }
      </div>
    </div>
  );
}

// ── Dashboard ──────────────────────────────────────────────
function Dashboard({user,onLogout}){
  const isMobile=useIsMobile();
  const today=formatDate(new Date());
  const[selectedDate,setSelectedDate]=useState(today);
  const[entry,setEntry]=useState(defaultEntry());
  const[allData,setAllData]=useState({});
  const[saved,setSaved]=useState(false);
  const[saveFlash,setSaveFlash]=useState(false);
  const[showHistory,setShowHistory]=useState(false);
  const[loading,setLoading]=useState(true);
  const[saving,setSaving]=useState(false);
  const[err,setErr]=useState("");

  useEffect(()=>{(async()=>{try{const all=await loadAllEntries(user.email);setAllData(all);setEntry({...defaultEntry(),...(all[today]||{})});setSaved(!!all[today]);}catch(e){setErr(e.message);}finally{setLoading(false);}})();},[]);

  const switchDate=async(d)=>{setSelectedDate(d);setLoading(true);try{const data=await loadEntry(user.email,d);setEntry({...defaultEntry(),...(data||{})});setSaved(!!data);}catch(e){setErr(e.message);}finally{setLoading(false);};};
  const set=useCallback((key,val)=>{setEntry(p=>({...p,[key]:val}));setSaved(false);},[]);
  const handleSave=async()=>{setSaving(true);setErr("");try{await saveEntry(user.email,selectedDate,entry);setAllData(p=>({...p,[selectedDate]:entry}));setSaved(true);setSaveFlash(true);setTimeout(()=>setSaveFlash(false),1800);}catch(e){setErr("저장 실패: "+e.message);}finally{setSaving(false);};};
  const handleLogout=async()=>{await signOut();onLogout();};
  const exportCSV=()=>{const rows=[["날짜","주간목표%","주체성","집중h","집중m","불안방어","요가","PT","개인운동","신체에너지%","리프레시","체중kg","응가","감정소모%","챗봇모드","조건부보상","기분점수","기분로그","메타인지","토닥임"],...Object.entries(allData).sort().map(([d,e])=>[d,e.weeklyGoal,e.proactiveScore,e.deepFocusHours,e.deepFocusMinutes,e.anxietyDefenseCount,e.routineYoga?"✓":"",e.routinePT?"✓":"",e.routinePersonal?"✓":"",e.physicalEnergy,e.postWorkoutRefresh,e.bodyWeight||"",e.poopDone===null?"":e.poopDone?"✓":"✗",e.emotionalDrain,e.chatbotMode===null?"":e.chatbotMode?"예":"아니오",e.rewardRuleMet===null?"":e.rewardRuleMet?"예":"아니오",e.moodScore||"",e.moodLog?.replace(/\n/g," ")||"",e.metacognitionLog?.replace(/\n/g," ")||"",e.selfCompassionCount])];const csv=rows.map(r=>r.map(v=>`"${v}"`).join(",")).join("\n");const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`dashboard_${today}.csv`;a.click();URL.revokeObjectURL(url);};

  const warn=entry.emotionalDrain>50;
  const isToday=selectedDate===today;
  const moodLabel=["","😞 힘든 하루","😕 우울했어","😐 그냥 그랬어","🙂 좋은 하루","😄 최고의 하루"];

  // ── Shared section components ──────────────────────────
  const StudySection=()=>(
    <div className="card">
      <SectionHeader emoji="📚" title="공부 — 방패 제작" subtitle="주도권 지표" color={C.study}/>
      <div className="col">
        <div style={{display:"flex",alignItems:"center",gap:"16px"}}>
          <ProgressRing value={entry.weeklyGoal} color={C.study} size={isMobile?100:120}/>
          <div style={{flex:1}}>
            <div className="label">주간 목표 완수율</div>
            <Slider value={entry.weeklyGoal} onChange={v=>set("weeklyGoal",v)} color={C.study}/>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:"11px",color:"#cbd5e1",marginTop:"5px"}}><span>0%</span><span>100%</span></div>
          </div>
        </div>
        <div>
          <div className="label">주체적 공부 점수</div>
          <div className="hint">스스로 주도했는가, 끌려다녔는가</div>
          <Stars value={entry.proactiveScore} onChange={v=>set("proactiveScore",v)} color={C.study} size={isMobile?24:22}/>
        </div>
        <div>
          <div className="label">도파민 순공 시간</div>
          <div style={{display:"flex",gap:"12px"}}>
            {[["deepFocusHours","시간",24],["deepFocusMinutes","분",59]].map(([key,unit,max])=>(
              <div key={key} style={{display:"flex",alignItems:"center",gap:"8px"}}>
                <input type="number" min={0} max={max} value={entry[key]} onChange={e=>set(key,Math.max(0,Math.min(max,Number(e.target.value))))}
                  style={{width:"68px",padding:"9px 8px",borderRadius:"10px",border:"1.5px solid #e2e8f0",background:"#f8fafc",textAlign:"center",fontSize:"16px",fontWeight:"700",color:"#374151",outline:"none"}}/>
                <span style={{fontSize:"13px",color:"#94a3b8"}}>{unit}</span>
              </div>
            ))}
          </div>
        </div>
        <div>
          <div className="label">불안 조절 횟수</div>
          <div className="hint">불안 올라왔을 때 공부로 복귀한 횟수</div>
          <Counter value={entry.anxietyDefenseCount} onChange={v=>set("anxietyDefenseCount",v)} color="#8b5cf6" large={isMobile}/>
        </div>
      </div>
    </div>
  );

  const WorkoutSection=()=>(
    <div className="card">
      <SectionHeader emoji="🧘‍♀️" title="운동 — 멘탈 배터리" subtitle="충전 지표" color={C.workout}/>
      <div className="col">
        <div>
          <div className="label">루틴 사수 여부</div>
          <Checkbox checked={entry.routineYoga} onChange={v=>set("routineYoga",v)} label="요가"/>
          <Checkbox checked={entry.routinePT} onChange={v=>set("routinePT",v)} label="PT"/>
          <Checkbox checked={entry.routinePersonal} onChange={v=>set("routinePersonal",v)} label="자체 운동"/>
        </div>
        <div>
          <div className="label">신체 에너지 레벨 <span style={{fontWeight:"800",color:C.workout,marginLeft:"6px"}}>{entry.physicalEnergy}%</span></div>
          <Slider value={entry.physicalEnergy} onChange={v=>set("physicalEnergy",v)} color={C.workout}/>
        </div>
        <div>
          <div className="label">운동 후 리프레시 지수</div>
          <div className="hint">운동 후 머리가 얼마나 맑아졌는가</div>
          <Stars value={entry.postWorkoutRefresh} onChange={v=>set("postWorkoutRefresh",v)} color={C.workout} size={isMobile?24:22}/>
        </div>
      </div>
    </div>
  );

  const HealthSection=()=>(
    <div className="card">
      <SectionHeader emoji="💚" title="건강 체크" subtitle="바디 & 컨디션" color={C.health}/>
      <div className="col">
        <div>
          <div className="label">체중 기록</div>
          <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
            <input type="number" min={30} max={150} step={0.1} value={entry.bodyWeight} onChange={e=>set("bodyWeight",e.target.value)} placeholder="00.0"
              style={{width:"90px",padding:"9px",borderRadius:"10px",border:"1.5px solid #e2e8f0",background:"#f8fafc",textAlign:"center",fontSize:"17px",fontWeight:"700",color:"#374151",outline:"none"}}/>
            <span style={{fontSize:"14px",color:"#94a3b8",fontWeight:"600"}}>kg</span>
          </div>
        </div>
        <div>
          <div className="label">응가 여부 🚽</div>
          <div style={{display:"flex",gap:"10px"}}>
            {[{v:true,e:"✅",l:"했어요"},{v:false,e:"❌",l:"못했어요"}].map(({v,e,l})=>(
              <button key={String(v)} className="btn" onClick={()=>set("poopDone",v)}
                style={{flex:1,padding:"10px 6px",borderRadius:"12px",fontSize:"13px",fontWeight:"700",
                  background:entry.poopDone===v?(v?"#d1fae5":"#fee2e2"):"#f8fafc",
                  color:entry.poopDone===v?(v?"#065f46":"#991b1b"):"#94a3b8",
                  border:`1.5px solid ${entry.poopDone===v?(v?"#6ee7b7":"#fca5a5"):"#e2e8f0"}`}}>
                {e} {l}
              </button>
            ))}
          </div>
        </div>
        <div style={{borderRadius:"12px",padding:"12px",background:"#f8fafc"}}>
          {[{l:"신체 에너지",v:entry.physicalEnergy,c:C.workout},{l:"감정 소모",v:entry.emotionalDrain,c:warn?"#f43f5e":C.romance}].map(({l,v,c})=>(
            <div key={l} style={{marginBottom:"8px"}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:"11px",marginBottom:"5px"}}>
                <span style={{color:"#64748b"}}>{l}</span><span style={{fontWeight:"700",color:c}}>{v}%</span>
              </div>
              <div style={{height:"7px",borderRadius:"9999px",background:"#e2e8f0"}}>
                <div style={{height:"100%",borderRadius:"9999px",background:c,width:`${v}%`,transition:"width 0.5s"}}/>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  const RomanceSection=()=>(
    <div className="card">
      <SectionHeader emoji="💔" title="연애 — 보험 유지비" subtitle="리스크 관리 지표" color={C.romance}/>
      <div className="col">
        <div>
          <div className="label">감정 소모도 <span style={{fontWeight:"800",color:warn?"#f43f5e":"#10b981",marginLeft:"6px"}}>{entry.emotionalDrain}%{warn?" ⚠":""}</span></div>
          <Slider value={entry.emotionalDrain} onChange={v=>set("emotionalDrain",v)} color={warn?"#f43f5e":C.romance}/>
        </div>
        <div>
          <div className="label">챗봇 모드 사수</div>
          <div className="hint">건조하고 논리적으로 응대했는가</div>
          <Toggle value={entry.chatbotMode} onChange={v=>set("chatbotMode",v)} compact={!isMobile}/>
        </div>
        <div>
          <div className="label">조건부 보상제 준수</div>
          <div className="hint">공부 목표 달성 후에만 집중</div>
          <Toggle value={entry.rewardRuleMet} onChange={v=>set("rewardRuleMet",v)} compact={!isMobile}/>
        </div>
      </div>
    </div>
  );

  const MentalSection=()=>(
    <div className="card">
      <SectionHeader emoji="🧠" title="종합 멘탈" subtitle="메타인지 & 자기 위로" color={C.mental}/>
      <div className="col">
        <div style={{borderRadius:"12px",padding:"12px",background:"#f8fafc"}}>
          <MetricRow label="주체성" value={entry.proactiveScore?`${entry.proactiveScore}/5`:"—"} color={C.study}/>
          <MetricRow label="챗봇모드" value={entry.chatbotMode===null?"—":entry.chatbotMode?"유지 ✓":"실패 ✗"} color={entry.chatbotMode?"#10b981":entry.chatbotMode===null?"#94a3b8":"#f43f5e"}/>
          <MetricRow label="조건부보상" value={entry.rewardRuleMet===null?"—":entry.rewardRuleMet?"준수 ✓":"위반 ✗"} color={entry.rewardRuleMet?"#10b981":entry.rewardRuleMet===null?"#94a3b8":"#f43f5e"}/>
        </div>
        <div>
          <div className="label">오늘의 메타인지</div>
          <div className="hint">3인칭 시점 — '그녀는 오늘...'</div>
          <textarea value={entry.metacognitionLog} onChange={e=>set("metacognitionLog",e.target.value)}
            placeholder="예: 그녀는 오늘 불안했지만 방패를 들었다." rows={3}
            style={{width:"100%",padding:"10px 12px",borderRadius:"10px",border:"1.5px solid #e2e8f0",background:"#f8fafc",fontSize:"13px",color:"#374151",resize:"none",outline:"none",lineHeight:"1.6"}}/>
        </div>
        <div>
          <div className="label">셀프 토닥임 횟수</div>
          <Counter value={entry.selfCompassionCount} onChange={v=>set("selfCompassionCount",v)} color={C.mental} large={isMobile}/>
        </div>
      </div>
    </div>
  );

  const MoodSection=()=>(
    <div className="card">
      <SectionHeader emoji="🌤" title="오늘의 기분" subtitle="감정 온도계 & 자유 기록" color={C.mental}/>
      <div className="mood-grid">
        <div className="col">
          <div>
            <div className="label">기분 선택</div>
            <MoodPicker value={entry.moodScore} onChange={v=>set("moodScore",v)} compact={!isMobile}/>
            {entry.moodScore>0&&<div style={{marginTop:"8px",textAlign:"center",fontSize:"12px",fontWeight:"700",color:"#92400e"}}>{moodLabel[entry.moodScore]}</div>}
          </div>
        </div>
        <div>
          <div className="label">감정 일지</div>
          <div className="hint">솔직하게 써봐요, 아무도 안 봐요 🙈</div>
          <textarea value={entry.moodLog} onChange={e=>set("moodLog",e.target.value)}
            placeholder="오늘 어떤 감정들이 지나갔나요?" rows={isMobile?3:4}
            style={{width:"100%",padding:"10px 12px",borderRadius:"10px",border:"1.5px solid #e2e8f0",background:"#f8fafc",fontSize:"13px",color:"#374151",resize:"none",outline:"none",lineHeight:"1.6"}}/>
        </div>
      </div>
    </div>
  );

  const SaveBar=()=>(
    <div style={{display:"flex",flexDirection:isMobile?"column":"row",alignItems:"center",justifyContent:"center",gap:"12px",paddingBottom:"40px"}}>
      <button className="btn" onClick={handleSave} disabled={saving}
        style={{width:isMobile?"100%":"auto",padding:"14px 40px",borderRadius:"16px",border:"none",
          background:saveFlash?"linear-gradient(135deg,#10b981,#059669)":"linear-gradient(135deg,#6366f1,#8b5cf6)",
          color:"white",fontWeight:"800",fontSize:"15px",
          boxShadow:saveFlash?"0 6px 20px #10b98144":"0 6px 20px #6366f133",
          display:"flex",alignItems:"center",justifyContent:"center",gap:"10px",opacity:saving?0.7:1}}>
        {saving?<div className="spin" style={{width:"16px",height:"16px",border:"2px solid rgba(255,255,255,0.3)",borderTopColor:"white",borderRadius:"50%"}}/>:<span>{saveFlash?"✅":"💾"}</span>}
        {saving?"저장 중...":saveFlash?"저장 완료! ☁️":"오늘 기록 저장하기"}
      </button>
      {saved&&!saveFlash&&<div style={{fontSize:"12px",color:"#10b981",fontWeight:"600"}}>☁️ 클라우드에 저장됨</div>}
      <button className="btn" onClick={exportCSV}
        style={{padding:"12px 20px",borderRadius:"12px",border:"1.5px solid #e2e8f0",background:"#f8fafc",color:"#64748b",fontWeight:"700",fontSize:"13px",display:"flex",alignItems:"center",gap:"6px"}}>
        ⬇️ CSV 내보내기
      </button>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",paddingBottom:"20px"}}>
      {/* Header */}
      <div style={{position:"sticky",top:0,zIndex:40,background:"rgba(255,255,255,0.9)",backdropFilter:"blur(16px)",borderBottom:"1px solid #e2e8f0",padding:isMobile?"10px 14px":"10px 24px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
            <div style={{width:"34px",height:"34px",borderRadius:"10px",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px"}}>🛡️</div>
            <div>
              <div style={{fontSize:"14px",fontWeight:"900",color:"#1e293b"}}>방패 대시보드</div>
              <div style={{fontSize:"10px",color:"#94a3b8"}}>{user.email}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:"8px"}}>
            <button className="btn" onClick={()=>setShowHistory(true)} style={{padding:"7px 10px",borderRadius:"10px",border:"1px solid #e2e8f0",background:"#f8fafc",fontSize:"12px",fontWeight:"600",color:"#64748b"}}>📋 {isMobile?"":"히스토리"}</button>
            <button className="btn" onClick={handleLogout} style={{padding:"7px 10px",borderRadius:"10px",border:"1px solid #fecdd3",background:"#fff1f2",fontSize:"12px",fontWeight:"600",color:"#e11d48"}}>🚪 {isMobile?"":"로그아웃"}</button>
          </div>
        </div>
        {/* Date nav */}
        <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
          <button className="btn" onClick={()=>switchDate(formatDate(new Date(parseDate(selectedDate).setDate(parseDate(selectedDate).getDate()-1))))}
            style={{width:"34px",height:"34px",borderRadius:"8px",border:"1px solid #e2e8f0",background:"#f8fafc",fontSize:"14px",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>◀</button>
          <div style={{flex:1,display:"flex",alignItems:"center",gap:"8px",padding:"7px 12px",borderRadius:"10px",background:"#f8fafc",border:"1px solid #e2e8f0"}}>
            <span style={{fontSize:"14px"}}>📅</span>
            <input type="date" value={selectedDate} max={today} onChange={e=>switchDate(e.target.value)}
              style={{flex:1,fontSize:"13px",background:"transparent",color:"#374151",border:"none",outline:"none"}}/>
            {isToday&&<span style={{fontSize:"10px",padding:"2px 7px",borderRadius:"6px",background:"#ede9fe",color:"#6d28d9",fontWeight:"700",flexShrink:0}}>오늘</span>}
          </div>
          <button className="btn" onClick={()=>switchDate(formatDate(new Date(parseDate(selectedDate).setDate(parseDate(selectedDate).getDate()+1))))}
            disabled={selectedDate>=today}
            style={{width:"34px",height:"34px",borderRadius:"8px",border:"1px solid #e2e8f0",background:"#f8fafc",fontSize:"14px",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,opacity:selectedDate>=today?0.3:1}}>▶</button>
        </div>
      </div>

      {loading?(
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"50vh",gap:"12px"}}>
          <div className="spin" style={{width:"36px",height:"36px",border:"3px solid #e2e8f0",borderTopColor:"#6366f1",borderRadius:"50%"}}/>
          <div style={{fontSize:"14px",color:"#94a3b8"}}>불러오는 중...</div>
        </div>
      ):(
      <div style={{padding:isMobile?"14px":"28px 24px",maxWidth:"1140px",margin:"0 auto",display:"flex",flexDirection:"column",gap:"16px"}}>
        {err&&<div style={{padding:"12px 16px",borderRadius:"12px",background:"#fff1f2",border:"1px solid #fecdd3",color:"#e11d48",fontSize:"13px"}}>⚠️ {err}</div>}
        {warn&&(
          <div style={{padding:"14px 18px",borderRadius:"16px",background:"linear-gradient(90deg,#fff1f2,#ffe4e6)",border:"1.5px solid #fecdd3",display:"flex",alignItems:"center",gap:"12px"}}>
            <span style={{fontSize:"22px"}}>🚨</span>
            <div>
              <div style={{fontSize:"14px",fontWeight:"800",color:"#be123c"}}>감정 누수 경고! 본업 집중 요망</div>
              <div style={{fontSize:"12px",color:"#fb7185",marginTop:"2px"}}>감정 소모 {entry.emotionalDrain}% — 지금 공부로 복귀하세요</div>
            </div>
          </div>
        )}

        {/* KPI */}
        <div className="kpi-grid">
          {[{l:"주간 달성률",v:`${entry.weeklyGoal}%`,c:C.study,e:"📈"},{l:"순공 시간",v:`${entry.deepFocusHours}h ${entry.deepFocusMinutes}m`,c:C.workout,e:"⏱️"},{l:"불안 방어",v:`${entry.anxietyDefenseCount}회`,c:"#8b5cf6",e:"🛡️"},{l:"셀프 토닥임",v:`${entry.selfCompassionCount}회`,c:C.mental,e:"✨"}].map(({l,v,c,e})=>(
            <div key={l} className="card" style={{padding:"14px",display:"flex",alignItems:"center",gap:"10px"}}>
              <div style={{width:"34px",height:"34px",borderRadius:"10px",background:c+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"17px",flexShrink:0}}>{e}</div>
              <div><div style={{fontSize:"11px",color:"#94a3b8",fontWeight:"500"}}>{l}</div><div style={{fontSize:"17px",fontWeight:"900",color:"#1e293b"}}>{v}</div></div>
            </div>
          ))}
        </div>

        {/* PC: 3-column grid / Mobile: single column */}
        <div className="main-grid">
          <StudySection/>
          <div className="mid-col">
            <WorkoutSection/>
            <RomanceSection/>
          </div>
          <div className="right-col">
            <HealthSection/>
            <MentalSection/>
          </div>
        </div>

        <MoodSection/>
        <SaveBar/>
      </div>
      )}
      {showHistory&&<HistoryModal allData={allData} onClose={()=>setShowHistory(false)} isMobile={isMobile}/>}
    </div>
  );
}

function App(){
  const[user,setUser]=useState(getUser);
  const[token,setTok]=useState(getToken);
  return(!user||!token)
    ?<LoginScreen onLogin={()=>{setUser(getUser());setTok(getToken());}}/>
    :<Dashboard user={user} onLogout={()=>{setUser(null);setTok(null);}}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
